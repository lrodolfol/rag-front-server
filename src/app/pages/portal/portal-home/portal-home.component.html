<div class="portal-home">
  <div class="portal-home__shell container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="portal-home__card card shadow-lg border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <p class="text-muted small mb-1">Bem-vindo ao painel</p>
          <h1 class="display-6 fw-bold mb-2">{{ title }}</h1>
          <p class="text-muted">
            Escolha uma das ações abaixo para gerenciar o seu negócio dentro do sistema.
          </p>
        </div>

        <div class="portal-home__menu">
          <article
            *ngFor="let option of menuOptions"
            class="portal-home__option card mb-3 shadow-sm"
          >
            <div class="card-body d-flex gap-3 align-items-start">
              <i [class]="'bi fs-3 ' + option.icon"></i>
              <div class="flex-grow-1">
                <h5 class="mb-1">{{ option.title }}</h5>
                <p class="text-muted mb-2">{{ option.description }}</p>
                <button
                  type="button"
                  class="btn btn-outline-primary btn-sm"
                  (click)="handleOption(option)"
                >
                  Acessar
                </button>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </div>
</div>
